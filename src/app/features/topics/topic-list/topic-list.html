<section>
  <div>
    Count:&nbsp;{{ topics.length }}
    @if (topics.length === 1) {
      <span>topic</span>
    } @else {
      <span>topics</span>
    }
  </div>
  <table>
    <thead>
      <tr appHighlight="blue">
        <th>Id</th>
        <th>Topic</th>
        <th>Description</th>
      </tr>
    </thead>
    <tbody>
      @for (topic of topics; track topic.id) {
        <tr appHighlight>
          <td>
            {{ topic.id }}
          </td>
          <td>
            {{ topic.title | titlecase }}
          </td>
          <td>
            {{ topic.description | truncate: 30 }}
          </td>
        </tr>
      } @empty {
        <tr>
          <td>no topics yet</td>
        </tr>
      }
    </tbody>
  </table>
</section>
